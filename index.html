<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>The Solutioning Room</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --border: #262b36;
      --text: #e6e8ec;
      --muted: #9aa3b2;
      --dev1: #5aa9e6;
      --pm: #e6a35a;
      --arch: #9b6ae6;
      --mgr: #5ae6a3;
      --accent: #5ae0c0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    p.sub {
      color: var(--muted);
      margin-top: 0;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px;
      font-size: 0.95rem;
      resize: vertical;
      font-family: inherit;
    }

    .row {
      display: flex;
      gap: 14px;
      margin-top: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .row label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .row label.inline {
      flex-direction: row;
      align-items: center;
      gap: 6px;
    }

    select,
    input[type=number],
    input[type=text] {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.9rem;
    }

    button {
      background: var(--accent);
      color: #04130f;
      border: none;
      border-radius: 8px;
      padding: 11px 20px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 10px;
      min-height: 1.2em;
    }

    #roster-line {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
      min-height: 1.2em;
    }

    /* --- 4-lane live discussion grid --- */
    #lanes {
      margin-top: 26px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    @media (max-width:1000px) {
      #lanes {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width:560px) {
      #lanes {
        grid-template-columns: 1fr;
      }
    }

    .lane {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-height: 420px;
      max-height: 620px;
      overflow: hidden;
      transition: box-shadow .2s, border-color .2s;
    }

    .lane.active {
      border-color: var(--lane-color);
      box-shadow: 0 0 0 1px var(--lane-color), 0 0 18px -4px var(--lane-color);
    }

    .lane-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 0.9rem;
      flex: none;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex: none;
      background: var(--lane-color);
    }

    .speaking-indicator {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--lane-color);
      opacity: 0;
      transition: opacity .15s;
    }

    .lane.active .speaking-indicator {
      opacity: 1;
    }

    .lane-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 11px;
      background: #11141b;
      font-size: 0.86rem;
      line-height: 1.45;
      white-space: pre-wrap;
      animation: fade .2s ease-in;
    }

    .msg.streaming {
      border-color: var(--lane-color);
    }

    .msg .tag {
      display: block;
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .caret {
      display: inline-block;
      width: 6px;
      height: 1em;
      background: var(--lane-color);
      margin-left: 2px;
      vertical-align: -2px;
      animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .typing-dots span {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--lane-color);
      margin-right: 3px;
      animation: bounce 1.1s infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: .15s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: .3s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: .4;
      }

      40% {
        transform: translateY(-3px);
        opacity: 1;
      }
    }

    #adr {
      margin-top: 32px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      display: none;
    }

    #adr h2 {
      font-size: 1.2rem;
    }

    #adr-body {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      line-height: 1.55;
      font-size: 0.92rem;
    }

    #adr-body h3 {
      font-size: 1rem;
      color: var(--accent);
      margin: 20px 0 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }

    #adr-body h3:first-child {
      margin-top: 0;
    }

    #adr-body ul {
      margin: 6px 0 6px 18px;
      padding: 0;
    }

    #adr-body li {
      margin-bottom: 4px;
    }

    #adr-body p {
      margin: 6px 0;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>🏗️ The Solutioning Room</h1>
    <p class="sub">A Backend Engineer, a Product Manager, an Architect, and an Engineering Manager debate your problem
      live — grounded in the team's guardrails — then converge on an ADR. The 4 names and speaking order are randomized
      fresh each run; the roles are always the same.</p>

    <textarea id="ask"
      placeholder="e.g. We need to add real-time duplicate-transaction detection to the payout pipeline before it scales 3x next quarter..."></textarea>

    <div class="row">
      <label>Provider
        <select id="provider">
          <option value="anthropic">anthropic (billed API key)</option>
          <option value="mock">mock (free, no API key)</option>
        </select>
      </label>
      <label>Model <input id="model" type="text" placeholder="claude-sonnet-4-6" style="width:220px" /></label>
      <label>Max turns <input id="max_turns" type="number" value="12" min="4" max="24" style="width:70px" /></label>
      <label style="justify-content:flex-end;">&nbsp;<button id="start">Start the Solutioning Room</button></label>
    </div>
    <div id="status"></div>
    <div id="roster-line"></div>

    <div id="lanes"></div>

    <div id="adr">
      <h2>📋 Final ADR</h2>
      <div id="adr-body"></div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const rosterLineEl = document.getElementById("roster-line");
    const startBtn = document.getElementById("start");
    const adrBox = document.getElementById("adr");
    const adrBody = document.getElementById("adr-body");
    const lanesEl = document.getElementById("lanes");
    let es = null;

    // Per-agent state: the DOM element of the message currently being streamed
    // into that agent's lane (or null if nobody's mid-turn there right now).
    const openMsg = {};

    // This run's cast — populated from the "roster" event, since names and
    // their order are randomized server-side fresh every run (see
    // agents.py:build_panel). Colors/voices are keyed by role_key.
    let roster = [];

    // Keys match the role_key values our orchestrator sends in the roster event:
    // BK_ENG, PM, ARCT, ENG_MGR.
    const ROLE_META = {
      BK_ENG: { color: "var(--dev1)", pitch: 1.0 },
      PM: { color: "var(--pm)", pitch: 1.15 },
      ARCT: { color: "var(--arch)", pitch: 0.85 },
      ENG_MGR: { color: "var(--mgr)", pitch: 1.25 },
    };

    // Tiny dependency-free markdown -> HTML for the final ADR. The ADR's
    // format is fixed (synthesize_stream always asks for the same "## Heading"
    // sections), so we only need to handle those few patterns.
    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function inlineMd(s) {
      return escapeHtml(s).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    }
    function renderMarkdown(md) {
      const lines = md.replace(/\r\n/g, "\n").split("\n");
      let html = "";
      let listOpen = false;
      const closeList = () => { if (listOpen) { html += "</ul>"; listOpen = false; } };
      for (const raw of lines) {
        const line = raw.trim();
        if (!line) { closeList(); continue; }
        if (line.startsWith("## ")) {
          closeList();
          html += `<h3>${inlineMd(line.slice(3).trim())}</h3>`;
        } else if (line.startsWith("- ") || line.startsWith("* ")) {
          if (!listOpen) { html += "<ul>"; listOpen = true; }
          html += `<li>${inlineMd(line.slice(2).trim())}</li>`;
        } else {
          closeList();
          html += `<p>${inlineMd(line)}</p>`;
        }
      }
      closeList();
      return html;
    }

    function laneLabel(turn) {
      return turn <= roster.length ? "Opening position" : `Turn ${turn}`;
    }

    function setActive(agent, isActive) {
      const lane = document.getElementById(`lane-${agent}`);
      if (lane) lane.classList.toggle("active", isActive);
    }

    function buildLanes(agentsList) {
      roster = agentsList;
      lanesEl.innerHTML = "";
      rosterLineEl.textContent = "Tonight's panel: " + agentsList.map(a => `${a.name} (${a.role_title})`).join(" · ");
      agentsList.forEach(a => {
        const meta = ROLE_META[a.role] || { color: "var(--accent)" };
        const lane = document.createElement("div");
        lane.className = "lane";
        lane.id = `lane-${a.name}`;
        lane.style.setProperty("--lane-color", meta.color);
        lane.innerHTML =
          `<div class="lane-head"><span class="dot"></span>${a.name}` +
          `<span style="color:var(--muted);font-weight:400;margin-left:6px;font-size:0.78rem;">${a.role_title}</span>` +
          `<span class="speaking-indicator">● speaking</span></div>` +
          `<div class="lane-body" id="body-${a.name}"></div>`;
        lanesEl.appendChild(lane);
        openMsg[a.name] = null;
      });
    }

    function ensureLane(name) {
      // Self-heal: a turn arrived for a name with no lane built yet.
      // Normally impossible (roster fires first), but guards against an SSE
      // reconnect that starts a new run mid-stream.
      if (document.getElementById(`lane-${name}`)) return;
      const lane = document.createElement("div");
      lane.className = "lane";
      lane.id = `lane-${name}`;
      lane.style.setProperty("--lane-color", "var(--accent)");
      lane.innerHTML =
        `<div class="lane-head"><span class="dot"></span>${name}` +
        `<span class="speaking-indicator">● speaking</span></div>` +
        `<div class="lane-body" id="body-${name}"></div>`;
      lanesEl.appendChild(lane);
      if (!(name in openMsg)) openMsg[name] = null;
      if (!roster.some(a => a.name === name)) roster.push({ name, role: null, role_title: "" });
    }

    function startTurn(event) {
      ensureLane(event.agent);
      setActive(event.agent, true);
      const body = document.getElementById(`body-${event.agent}`);
      if (!body) return;
      const div = document.createElement("div");
      div.className = "msg streaming";
      div.innerHTML = `<span class="tag">${laneLabel(event.turn)}</span><span class="text"></span><span class="typing-dots"><span></span><span></span><span></span></span>`;
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;
      openMsg[event.agent] = div;
    }

    function appendDelta(event) {
      let div = openMsg[event.agent];
      if (!div) { startTurn(event); div = openMsg[event.agent]; }
      const dots = div.querySelector(".typing-dots");
      if (dots) dots.remove();
      div.querySelector(".text").textContent += event.delta;
      if (!div.querySelector(".caret")) {
        div.insertAdjacentHTML("beforeend", '<span class="caret"></span>');
      }
      const body = div.parentElement;
      body.scrollTop = body.scrollHeight;
    }

    function finalizeTurn(event) {
      let div = openMsg[event.agent];
      if (!div) { startTurn({ agent: event.agent, turn: event.turn }); div = openMsg[event.agent]; }
      div.classList.remove("streaming");
      div.innerHTML = `<span class="tag">${laneLabel(event.turn)}</span>`;
      div.appendChild(document.createTextNode(event.content));
      openMsg[event.agent] = null;
      setActive(event.agent, false);

      if (event.phase === "synthesis") {
        adrBody.innerHTML = renderMarkdown(event.content);
        adrBox.style.display = "block";
        statusEl.textContent = "Done.";
        if (es) es.close();
        startBtn.disabled = false;
        adrBox.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    startBtn.addEventListener("click", () => {
      const ask = document.getElementById("ask").value.trim();
      if (!ask) { alert("Describe the problem first."); return; }
      if (es) { es.close(); }
      lanesEl.innerHTML = "";
      rosterLineEl.textContent = "";
      Object.keys(openMsg).forEach(k => delete openMsg[k]);
      roster = [];
      adrBox.style.display = "none";
      startBtn.disabled = true;
      statusEl.textContent = "Connecting...";

      const provider = document.getElementById("provider").value;
      const model = document.getElementById("model").value || "claude-sonnet-4-6";
      const maxTurns = document.getElementById("max_turns").value;
      const params = new URLSearchParams({ ask, provider, model, max_turns: maxTurns });

      es = new EventSource("/stream?" + params.toString());
      statusEl.textContent = "Discussion in progress...";

      es.onmessage = (e) => {
        const event = JSON.parse(e.data);
        if (event.phase === "roster") {
          buildLanes(event.agents);
        } else if (event.phase === "turn_start") {
          startTurn(event);
        } else if (event.phase === "delta") {
          appendDelta(event);
        } else if (["opening", "discussion", "synthesis"].includes(event.phase)) {
          finalizeTurn(event);
        } else if (event.phase === "error") {
          statusEl.textContent = "Error: " + event.content;
          es.close();
          startBtn.disabled = false;
        }
      };
      es.onerror = () => {
        if (statusEl.textContent !== "Done.") {
          statusEl.textContent = "Connection lost or server not running — start it with: python main.py";
        }
        startBtn.disabled = false;
      };
    });
  </script>
</body>

</html>
